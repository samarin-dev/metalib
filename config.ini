[GENERAL]
input_dir = Input
output_dir = Output

[RESOLUTION]
# Resize images?
enable_resizing = False
# Mode: Lansdcape or portrait
mode = portrait
# Resolution
width = 4032
height = 3024

[EFFECTS]
# Artifacts?
enable_artifacts = True
# Dead pixels count
dead_pixels_count = 10
# Sensor noise count
sensor_stripes_count = 0

[PRESETS]
# Preset (or random)
current_preset = random

[BLUR]
# Blur?
enable_blur = True
# Strenght
blur_radius = 2.5

[SHARPEN]
# Enable sharpen effect (True/False)
enable_sharpen = True
# Sharpness intensity. 
# 1.0 is default, 2.0 is double sharpness.
# Recommended values: 1.5 to 3.0
sharpen_factor = 2.1

[GRAIN]
# Enable grain effect (True/False)
enable_grain = True
# Grain intensity (0.1 to 1.0 recommended)
# Higher values make grain more visible
grain_intensity = 0.1

[TEXT]
enable_text = true
; Path to the dictionary file (words separated by spaces)
dictionary_path = dictionary.txt
; Number of words to pick for each random phrase
word_count = 6
; Anchor position of the text block on the image/frame.
; Supported values: TL TC TR  (top row)
;                   LC CC RC  (middle row)
;                   BL BC BR  (bottom row)
; Legacy aliases also accepted: LT RT RB LB TT
anchor = BL
; Padding from the nearest border as a ratio of image width (x) and height (y).
; 0.05 = 5% of the image dimension.
padding_x_ratio = 0.05
padding_y_ratio = 0.05
; Maximum line length before word-wrap, as a ratio of image width.
; 0.7 = text block occupies up to 70% of image width.
wrap_width_ratio = 0.7
; Text opacity: 0.0 = fully transparent, 1.0 = fully opaque.
opacity = 0.3
; Stroke (outline) width in pixels.
stroke_width = 2
; Font size in points/pixels.
font_size = 14
; (Optional) Explicit path to a .ttf font file.
; If left empty, the script auto-detects a system font.
; font_path = C:/Windows/Fonts/arial.ttf
